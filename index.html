<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Game HSK1 Tự Động - Tiếng Trung Thảo Nguyên</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 700px; background: white; margin: 20px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1B365D; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1B365D; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2c3e50; }
        .game-area { display: none; margin-top: 20px; background: #fafafa; padding: 20px; border-radius: 8px; border: 1px dashed #1B365D; }
        .word-card { display: inline-block; padding: 15px; margin: 10px; background: #e8eef5; border-radius: 8px; font-size: 18px; font-weight: bold; color: #1B365D; border-left: 4px solid #1B365D; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 HỆ THỐNG TRÒ CHƠI TIẾNG TRUNG HSK1 🎮</h1>
    <p>Dữ liệu tự động cập nhật từ Google Sheets của giáo viên</p>
    
    <input type="text" id="studentName" placeholder="Nhập Họ và Tên học sinh...">
    <input type="text" id="studentClass" placeholder="Nhập Lớp học...">
    
    <label style="text-align: left; display: block; font-weight: bold; margin-top: 10px;">Chọn bài học muốn chơi:</label>
    <select id="lessonSelect" onchange="taiDuLieuBaiHoc()">
        <option value="1">Bài 1 - Chào bạn (你好)</option>
        <option value="2">Bài 2 - Cảm ơn bạn (谢谢你)</option>
        <option value="3">Bài 3 - Bạn tên là gì</option>
        <option value="4">Bài 4 - Cô ấy là giáo viên tiếng Trung của tôi</option>
        <option value="5">Bài 5 - Con gái cô ấy năm nay 20 tuổi</option>
        <option value="6">Bài 6 - Tôi biết nói tiếng Trung</option>
        <option value="7">Bài 7 - Hôm nay ngày mấy</option>
        <option value="8">Bài 8 - Tôi muốn mua một cốc trà</option>
        <option value="9">Bài 9 - Bạn làm việc ở đâu</option>
        <option value="10">Bài 10 - Tôi có thể ngồi đây không</option>
        <option value="11">Bài 11 - Thời tiết ngày mai thế nào</option>
        <option value="12">Bài 12 - Ngày mai tôi muốn xem phim</option>
        <option value="13">Bài 13 - Anh ấy đang học nấu món ăn Trung Quốc</option>
        <option value="14">Bài 14 - Cô ấy mua rất nhiều quần áo</option>
        <option value="15">Bài 15 - Tôi đến bằng máy bay</option>
    </select>
    
    <button onclick="moKhuVucChoi()">BẮT ĐẦU CHƠI</button>

    <div id="gameArea" class="game-area">
        <h2>NỘI DUNG TỪ VỰNG BÀI HỌC (TỰ ĐỘNG TỪ EXCEL)</h2>
        <div id="vocabularyContainer">Đang tải dữ liệu từ Google Sheets...</div>
        
        <div style="margin-top: 30px; background: #eafaf1; padding: 15px; border-radius: 8px;">
            <p><strong>Kết quả làm bài hệ thống chấm tự động:</strong> Hoàn thành bài tập</p>
        </div>
        <button style="background-color: #27ae60;" onclick="guiDiemTuDong()">BẤM ĐỂ NỘP ĐIỂM LÊN FILE CHO CÔ</button>
    </div>
</div>

<script>
    // 🔴 CHÚ Ý: Bạn hãy lấy link Web App từ file Trả Kết Quả mới (137N_Ubop...) dán vào giữa dấu "" dưới đây nhé:
    const WEB_APP_URL = "137N_UbopPQxQYmDfkntR_OfIAhuxvsbX5tjHodC03pY";
    
    // Đã cấu hình chính xác ID file Bài tập của bạn để tự bốc từ vựng
    const SPREADSHEET_ID = "1Km9ZPK8TDVBBE39eR-yZD-Njkbd5GId7rLZVlaxA0R4";

    function taiDuLieuBaiHoc() {
        const lessonNum = document.getElementById("lessonSelect").value;
        const container = document.getElementById("vocabularyContainer");
        container.innerHTML = "Chờ một chút, hệ thống đang kết nối dữ liệu Bài " + lessonNum + "...";
        
        const sheetName = encodeURIComponent("Bài " + lessonNum + " - Trò Chơi");
        const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
        
        fetch(csvUrl)
        .then(response => response.text())
        .then(data => {
            const lines = data.split('\n').map(line => line.split(','));
            let htmlContent = "";
            
            // Đọc tự động từ hàng 9 đến hàng 14 trên file Google Sheets câu hỏi của bạn
            for(let i = 8; i < 14; i++) {
                if(lines[i] && lines[i][1]) {
                    let chuHan = lines[i][1].replace(/"/g, "").trim();
                    let yNghia = lines[i][2] ? lines[i][2].replace(/"/g, "").trim() : "";
                    if(chuHan !== "" && !chuHan.includes("Mặt Trước") && !chuHan.includes("Từ vựng")) {
                        htmlContent += `<div class="word-card">🇨🇳 ${chuHan} = 🇻🇳 ${yNghia}</div>`;
                    }
                }
            }
            container.innerHTML = htmlContent || "Bài học này hiện tại chưa có dữ liệu từ vựng trên file Google Sheets câu hỏi.";
        }).catch(err => {
            container.innerHTML = "Không thể tải được dữ liệu. Hãy chắc chắn bạn đã điền nội dung và mở quyền 'Bất kỳ ai có liên kết đều xem được' cho file Google Sheets bài tập nhé!";
        });
    }

    function moKhuVucChoi() {
        var name = document.getElementById("studentName").value;
        if(!name) { alert("Vui lòng điền họ tên học sinh trước khi chơi nhé!"); return; }
        document.getElementById("gameArea").style.display = "block";
        taiDuLieuBaiHoc();
    }

    function guiDiemTuDong() {
        var name = document.getElementById("studentName").value;
        var className = document.getElementById("studentClass").value;
        var lessonNum = document.getElementById("lessonSelect").value;

        if(WEB_APP_URL.includes("DÁN_LINK")) {
            alert("Lỗi: Chị Thảo Nguyên ơi, chị chưa dán link Web App nhận điểm của file Trả kết quả vào dòng số 64 đâu nhé!");
            return;
        }

        var data = {
            studentName: name,
            studentClass: className,
            lessonId: "HSK1_BAI_" + (parseInt(lessonNum) < 10 ? "0" + lessonNum : lessonNum),
            g1: 20, g2: 20, g3: 20, g4: 20, g5: 20,
            comment: "Hoàn thành bài tập tự động!"
        };

        alert("Hệ thống đang nộp điểm lên file Trả Kết Quả...");

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        }).then(() => {
            alert("🎉 NỘP BÀI THÀNH CÔNG! Điểm số đã chạy về file Bảng điểm mới.");
        }).catch(err => {
            alert("Lỗi gửi điểm: " + err);
        });
    }
</script>
</body>
</html>
